services:
  # Backend API Web Service
  - type: web
    name: style-heaven-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        value: https://usvlnjswlebpvapolffo.supabase.co
      - key: CLOUDINARY_CLOUD_NAME
        value: dcmmxmikz
      - key: CLOUDINARY_API_KEY
        value: "149393542854794"
      - key: TWILIO_WHATSAPP_FROM
        value: "+14155238886"
      # Secure and sensitive variables with sync protection
      - key: JWT_SECRET
        generateValue: true
      - key: SUPABASE_SERVICE_KEY
        value: replace_with_supabase_service_role_key
        sync: false
      - key: CLOUDINARY_API_SECRET
        value: replace_with_cloudinary_api_secret
        sync: false
      - key: TWILIO_ACCOUNT_SID
        value: replace_with_twilio_account_sid
        sync: false
      - key: TWILIO_AUTH_TOKEN
        value: replace_with_twilio_auth_token
        sync: false

  # Frontend Static Site
  - type: web
    name: style-heaven-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_SUPABASE_URL
        value: https://usvlnjswlebpvapolffo.supabase.co
      - key: REACT_APP_SUPABASE_ANON_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzdmxuanN3bGVicHZhcG9sZmZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5ODAzMjQsImV4cCI6MjA5MzU1NjMyNH0.TyziKPzjkZzhZK68rNl9Zzj-21uVrIhFSIuKuQdHkHY
      - key: REACT_APP_LOCATIONIQ_API_KEY
        value: pk.f2bad577bd835e11c81ffd571d5c353b
      # Public URL of the backend web service (user overrides if backend name changes)
      - key: REACT_APP_API_URL
        value: https://style-heaven-backend.onrender.com
        sync: false
